version: "3.9"

services:
  db:
    image: postgres:15
    container_name: hpms-db
    restart: always
    environment:
      POSTGRES_DB: hpms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - hpms_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: hpms-backend
    depends_on:
      - db
    ports:
      - "8788:8788"
    env_file:
      - .env

volumes:
  hpms_data: